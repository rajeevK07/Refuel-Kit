[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
rootstock_testnet = "https://public-node.testnet.rsk.co"
rootstock_mainnet = "https://public-node.rsk.co"

[etherscan]
rootstock_testnet = { key = "${BLOCKSCOUT_API_KEY}", url = "https://rootstock-testnet.blockscout.com/api/" }
rootstock_mainnet = { key = "${BLOCKSCOUT_API_KEY}", url = "https://rootstock.blockscout.com/api/" }
